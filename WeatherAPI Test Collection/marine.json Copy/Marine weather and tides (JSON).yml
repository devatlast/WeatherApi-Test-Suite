info:
  name: Marine weather and tides (JSON)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/marine.json?key={{apiKey}}&q=Paris&days=7&dt=2026-05-22&tides=no&lang=french"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: key
      value: "{{apiKey}}"
      type: query
    - name: q
      value: Paris
      type: query
    - name: days
      value: "7"
      type: query
    - name: dt
      value: 2026-05-22
      type: query
    - name: tides
      value: no
      type: query
    - name: lang
      value: french
      type: query
  auth:
    type: apikey
    key: x-api-key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Marine response
    request:
      url: "{{baseUrl}}/marine.json?q=string&days=7&dt=1999-06-07&tides=no&lang=string&key=<API Key>"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: q
          value: string
          type: query
        - name: days
          value: "7"
          type: query
        - name: dt
          value: 1999-06-07
          type: query
        - name: tides
          value: no
          type: query
        - name: lang
          value: string
          type: query
        - name: key
          value: <API Key>
          type: query
          description: "Added as a part of security scheme: apikey"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "key_0": 9623,
            "key_1": 2164,
            "key_2": 3205.4823401553235
          }

docs: |-
  ## Marine Weather and Tides

  Retrieves marine weather conditions and tide information for coastal and ocean locations. Essential data for maritime activities and coastal planning.

  ### Required Parameters
  - **q** (query): Location identifier - can be:
    - City/port name (e.g., "Southampton")
    - Latitude/longitude (e.g., "50.9097,-1.4044")
    - Coastal coordinates
  - **key** (query): Your WeatherAPI.com API key for authentication
  - **days** (query): Number of forecast days (1-7, default: 7)

  ### Optional Parameters
  - **dt**: Specific date for marine forecast (format: yyyy-MM-dd)
  - **tides**: Include tide information (yes/no, default: no)
  - **lang**: Response language code (e.g., "en", "es", "fr")

  ### Common Use Cases
  - Sailing and boating trip planning
  - Fishing expedition scheduling
  - Surfing condition forecasts
  - Maritime shipping and navigation
  - Coastal construction planning
  - Beach safety monitoring
  - Port operations management

  ### Response Highlights
  Returns marine-specific weather data including:
  - Sea temperature and conditions
  - Wave height and swell information
  - Wind speed and direction over water
  - Visibility at sea
  - Tide times and heights (when enabled)
  - Water current information
  - Marine weather warnings

  Ideal for anyone planning activities on or near the water.
