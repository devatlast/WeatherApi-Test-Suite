info:
  name: Sports events (JSON)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/sports.json?q=United States"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: q
      value: United States
      type: query
  auth:
    type: apikey
    key: x-api-key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Sports response
    request:
      url: "{{baseUrl}}/sports.json?q=string&key=<API Key>"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: q
          value: string
          type: query
        - name: key
          value: <API Key>
          type: query
          description: "Added as a part of security scheme: apikey"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "key_0": 9623,
            "key_1": 2164,
            "key_2": 3205.4823401553235
          }

docs: |-
  ## Sports Events

  Retrieves information about upcoming sports events and matches for a specified location. Get schedules for various sports including football, cricket, and golf.

  ### Required Parameters
  - **q** (query): Location identifier - can be:
    - City name (e.g., "Manchester")
    - Latitude/longitude (e.g., "53.4808,-2.2426")
    - Country name (e.g., "England")
  - **key** (query): Your WeatherAPI.com API key for authentication

  ### Optional Parameters
  None for this endpoint

  ### Common Use Cases
  - Sports event planning and scheduling
  - Travel planning for sports fans
  - Venue weather coordination
  - Sports broadcasting preparation
  - Event management and logistics
  - Sports tourism applications
  - Fantasy sports planning
  - Ticket sales and attendance forecasting

  ### Response Highlights
  Returns information about upcoming sports events including:
  - Event name and type (football, cricket, golf, etc.)
  - Match details and teams
  - Event date and time
  - Stadium or venue information
  - Tournament or league information
  - Event location

  Useful for combining sports schedules with weather forecasts to plan attendance or outdoor viewing events.
