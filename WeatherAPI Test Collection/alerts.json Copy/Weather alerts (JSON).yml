info:
  name: Weather alerts (JSON)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/alerts.json?q=kaduna"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: q
      value: kaduna
      type: query
  auth:
    type: apikey
    key: x-api-key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Alerts response
    request:
      url: "{{baseUrl}}/alerts.json?q=string&key=<API Key>"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: q
          value: string
          type: query
        - name: key
          value: <API Key>
          type: query
          description: "Added as a part of security scheme: apikey"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "key_0": 9623,
            "key_1": 2164,
            "key_2": 3205.4823401553235
          }

docs: |-
  ## Weather Alerts

  Retrieves active weather alerts and warnings for a specified location. Get real-time severe weather notifications issued by meteorological agencies.

  ### Required Parameters
  - **q** (query): Location identifier - can be:
    - City name (e.g., "Miami")
    - Latitude/longitude (e.g., "25.7617,-80.1918")
    - US zip code (e.g., "33101")
    - UK postcode (e.g., "SW1")
    - IP address (e.g., "100.0.0.1")
    - IATA airport code (e.g., "MIA")
  - **key** (query): Your WeatherAPI.com API key for authentication

  ### Optional Parameters
  None for this endpoint

  ### Common Use Cases
  - Emergency weather notification systems
  - Travel safety alerts
  - Event planning risk assessment
  - Public safety applications
  - Weather-dependent business operations monitoring
  - Mobile app push notifications for severe weather

  ### Response Highlights
  Returns active weather alerts including:
  - Alert type and severity level
  - Headline and detailed description
  - Effective and expiration times
  - Affected areas
  - Instructions and recommendations
  - Issuing meteorological authority

  Alerts may include warnings for hurricanes, tornadoes, floods, heat waves, winter storms, and other severe weather conditions.
