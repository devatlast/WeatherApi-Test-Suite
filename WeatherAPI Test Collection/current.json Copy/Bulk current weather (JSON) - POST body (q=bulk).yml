http:
  method: POST
  url: "{{baseUrl}}/current.json?key={{apiKey}}&q=Burkina Faso&aqi=no&pollen=no&lang=french"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: key
      value: "{{apiKey}}"
      type: query
    - name: q
      value: Burkina Faso
      type: query
    - name: aqi
      value: no
      type: query
    - name: pollen
      value: no
      type: query
    - name: lang
      value: french
      type: query
  body:
    type: json
    data: |-
      {
        "locations": [
          {
            "q": "London",
            "custom_id": "location1"
          },
          {
            "q": "48.8567,2.3508",
            "custom_id": "location2"
          }
        ]
      }
  auth:
    type: apikey
    key: key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

