info:
  name: Time zone (JSON)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/timezone.json?key={{apiKey}}&q=string"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: key
      value: "{{apiKey}}"
      type: query
    - name: q
      value: string
      type: query
  auth:
    type: apikey
    key: x-api-key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Time zone response
    request:
      url: "{{baseUrl}}/timezone.json?q=string&key=<API Key>"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: q
          value: string
          type: query
        - name: key
          value: <API Key>
          type: query
          description: "Added as a part of security scheme: apikey"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "key_0": 9623,
            "key_1": 2164,
            "key_2": 3205.4823401553235
          }

docs: |-
  Returns location and time zone information in JSON format. This endpoint provides the current local time, UTC offset, and time zone details for any location specified by query parameter (city name, coordinates, IP address, or US/Canada/UK zip code).

  **Response includes:**

  - Location details (name, region, country, coordinates)
      
  - Current local time and date
      
  - Time zone name and identifier
      
  - UTC offset in hours
      
  - Whether daylight saving time is currently active
      

  **Use cases:**

  - Display local time for any global location
      
  - Convert between time zones
      
  - Validate location-based time zone data
