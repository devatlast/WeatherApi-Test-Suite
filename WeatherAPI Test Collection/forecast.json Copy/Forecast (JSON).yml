docs: |-
  ## Weather Forecast Data

  Retrieves weather forecast information for up to 14 days for a specified location.

  ### Required Parameters
  - **q** (query): Location identifier - can be:
    - City name (e.g., "Paris")
    - Latitude/longitude (e.g., "48.8567,2.3508")
    - US zip code (e.g., "10001")
    - UK postcode (e.g., "SW1")
    - IP address (e.g., "100.0.0.1")
    - IATA airport code (e.g., "CDG")
  - **key** (query): Your WeatherAPI.com API key for authentication
  - **days** (query): Number of forecast days (1-14, default: 3)

  ### Optional Parameters
  - **dt**: Specific date for forecast (format: yyyy-MM-dd)
  - **unixdt**: Unix timestamp for specific date
  - **hour**: Specific hour for hourly forecast (0-23)
  - **aqi**: Include air quality data (yes/no, default: no)
  - **alerts**: Include weather alerts (yes/no, default: no)
  - **lang**: Response language code (e.g., "en", "es", "fr")

  ### Common Use Cases
  - Multi-day weather forecasts for travel planning
  - Hourly weather predictions for events
  - Weather-dependent scheduling and logistics
  - Agricultural and outdoor activity planning

  ### Response Highlights
  Returns daily and hourly forecasts including temperature, precipitation, wind, humidity, sunrise/sunset times, moon phases, and optional alerts.
