  url: "{{baseUrl}}/forecast.json?key={{apiKey}}&q=Louisiana&days=7&dt=2026-05-22&unixdt=5705&hour=13&alerts=no&aqi=no&pollen=no&tp=15&current_fields=string&day_fields=string&hour_fields=string&et0=no&lang=en"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: key
      value: "{{apiKey}}"
      type: query
    - name: q
      value: Louisiana
      type: query
    - name: days
      value: "7"
      type: query
    - name: dt
      value: 2026-05-22
      type: query
    - name: unixdt
      value: "5705"
      type: query
    - name: hour
      value: "13"
      type: query
    - name: alerts
      value: no
      type: query
    - name: aqi
      value: no
      type: query
    - name: pollen
      value: no
      type: query
    - name: tp
      value: "15"
      type: query
    - name: current_fields
      value: string
      type: query
    - name: day_fields
      value: string
      type: query
    - name: hour_fields
      value: string
