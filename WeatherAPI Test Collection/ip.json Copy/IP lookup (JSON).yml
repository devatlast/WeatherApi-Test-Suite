info:
  name: IP lookup (JSON)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/ip.json?key={{apiKey}}&q=8.8.8.8"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: key
      value: "{{apiKey}}"
      type: query
    - name: q
      value: 8.8.8.8
      type: query
  auth:
    type: apikey
    key: x-api-key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: IP lookup response
    request:
      url: "{{baseUrl}}/ip.json?q=string&key=<API Key>"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: q
          value: string
          type: query
          description: IPv4 or IPv6 address to lookup.
        - name: key
          value: <API Key>
          type: query
          description: "Added as a part of security scheme: apikey"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "key_0": 9623,
            "key_1": 2164,
            "key_2": 3205.4823401553235
          }

docs: |-
  ## IP Address Lookup

  Retrieves geographical location information from an IP address. Useful for determining location-based weather without requiring explicit location input from users.

  ### Required Parameters

  - **q** (query): IPv4 or IPv6 address to lookup (e.g., "8.8.8.8" or "2001:4860:4860::8888")
      
  - **key** (query): Your WeatherAPI.com API key for authentication
      

  ### Optional Parameters

  None for this endpoint

  ### Common Use Cases

  - Automatic location detection for weather apps
      
  - Providing localized weather without user input
      
  - Geo-targeting weather content
      
  - Analytics and location-based services
      
  - Default location setting for new users
      
  - IP-based weather widgets
      
  - Location verification for services
      

  ### Response Highlights

  Returns geographical information for the IP address including:

  - City name
      
  - Region/state
      
  - Country name and code
      
  - Latitude and longitude coordinates
      
  - Time zone information
      
  - ISP information
      

  The returned location data can be used directly as the 'q' parameter in other weather API endpoints to fetch weather information for that location.
