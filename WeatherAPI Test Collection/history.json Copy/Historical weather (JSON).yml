info:
  name: Historical weather (JSON)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/history.json?q=Ekiti&dt=2010-01-01&hour=13&aqi=no&pollen=no"
  headers:
    - name: Accept
      value: application/json
    - name: key
      value: "{{apiKey}}"
  params:
    - name: q
      value: Ekiti
      type: query
    - name: dt
      value: 2010-01-01
      type: query
    - name: hour
      value: "13"
      type: query
    - name: aqi
      value: no
      type: query
    - name: pollen
      value: no
      type: query
  auth:
    type: apikey
    key: x-api-key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: History response
    request:
      url: "{{baseUrl}}/history.json?q=string&dt=1999-06-07&unixdt=5705&end_dt=1999-06-07&unixend_dt=5705&hour=13&aqi=no&pollen=no&tp=15&current_fields=string&day_fields=string&hour_fields=string&solar=no&et0=no&wind100mph=no&wind100kph=no&lang=string&key=<API Key>"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: q
          value: string
          type: query
        - name: dt
          value: 1999-06-07
          type: query
        - name: unixdt
          value: "5705"
          type: query
        - name: end_dt
          value: 1999-06-07
          type: query
        - name: unixend_dt
          value: "5705"
          type: query
        - name: hour
          value: "13"
          type: query
        - name: aqi
          value: no
          type: query
        - name: pollen
          value: no
          type: query
        - name: tp
          value: "15"
          type: query
        - name: current_fields
          value: string
          type: query
        - name: day_fields
          value: string
          type: query
        - name: hour_fields
          value: string
          type: query
        - name: solar
          value: no
          type: query
        - name: et0
          value: no
          type: query
        - name: wind100mph
          value: no
          type: query
        - name: wind100kph
          value: no
          type: query
        - name: lang
          value: string
          type: query
        - name: key
          value: <API Key>
          type: query
          description: "Added as a part of security scheme: apikey"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "key_0": 9623,
            "key_1": 2164,
            "key_2": 3205.4823401553235
          }

docs: |-
  ## Historical Weather Data

  Retrieves past weather information for a specified location and date range. Access historical weather data going back several years.

  ### Required Parameters
  - **q** (query): Location identifier - can be:
    - City name (e.g., "Tokyo")
    - Latitude/longitude (e.g., "35.6762,139.6503")
    - US zip code (e.g., "90210")
    - UK postcode (e.g., "SW1")
    - IP address (e.g., "100.0.0.1")
    - IATA airport code (e.g., "LAX")
  - **key** (query): Your WeatherAPI.com API key for authentication
  - **dt** (query): Date for historical data (format: yyyy-MM-dd, e.g., "2023-06-15")

  ### Optional Parameters
  - **unixdt**: Unix timestamp for the date (alternative to dt)
  - **end_dt**: End date for date range queries (format: yyyy-MM-dd)
  - **unixend_dt**: Unix timestamp for end date
  - **hour**: Specific hour for hourly data (0-23)
  - **aqi**: Include air quality data (yes/no, default: no)
  - **pollen**: Include pollen data (yes/no, default: no)
  - **tp**: Time interval for data points (15, 30, 60 minutes)
  - **lang**: Response language code (e.g., "en", "es", "fr")
  - **solar**: Include solar radiation data (yes/no, default: no)
  - **et0**: Include evapotranspiration data (yes/no, default: no)

  ### Common Use Cases
  - Weather analysis and research
  - Historical weather comparisons
  - Climate trend analysis
  - Verifying past weather conditions for insurance/legal purposes
  - Agricultural planning based on historical patterns

  ### Response Highlights
  Returns historical weather data including temperature, precipitation, wind speed, humidity, pressure, and optional air quality/solar data for the specified date(s).
