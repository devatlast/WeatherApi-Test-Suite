  headers:
    - name: Accept
      value: application/json
  params:
    - name: key
      value: "{{apiKey}}"
      type: query
    - name: q
      value: lagos
      type: query
    - name: aqi
      value: no
      type: query
    - name: pollen
      value: no
      type: query
    - name: lang
      value: en
      type: query
    - name: current_fields
      value: ""
      type: query
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

